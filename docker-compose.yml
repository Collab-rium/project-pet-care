version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - USE_FIRESTORE=false
    volumes:
      - ./backend:/app
    command: ["npm","run","start"]

  frontend:
    build: ./frontend
    # frontend container is mainly for building; it does not serve by default
    volumes:
      - ./frontend:/app
    command: ["bash","-c","sleep infinity"]
