name: project_pet_care_frontend
description: "Frontend for Project Pet Care MVP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # HTTP client for API calls
  http: ^1.1.0
  # Image picker for pet photos
  image_picker: ^1.0.4
  # Secure storage for JWT tokens
  flutter_secure_storage: ^9.0.0
  # Regular preferences for non-sensitive data
  shared_preferences: ^2.2.2
  # Date/time formatting
  intl: ^0.18.1
  # State management
  provider: ^6.1.1
  # Firebase Core (required for all Firebase services)
  firebase_core: ^2.24.0
  # Firebase Messaging (for push notifications)
  firebase_messaging: ^14.7.0
  # Database (SQLite)
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  # Image processing
  image: ^4.1.3
  # Charts
  fl_chart: ^0.65.0
  # File picker (backup/restore)
  file_picker: ^10.3.10
  # Permissions
  permission_handler: ^11.1.0
  # Google Fonts
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  # For mocking in tests
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/
